<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a1a" />

    <!-- SEO -->
    <title>Hacker News Times — Hacker News, Beautifully Delivered</title>
    <meta name="description" content="A beautiful, newspaper-style Hacker News reader. Browse top stories, best posts, Ask HN, Show HN, and jobs in an elegant reading experience. Free weekly newsletter." />
    <link rel="canonical" href="https://hackernewstimes.com" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Hacker News Times — Hacker News, Beautifully Delivered" />
    <meta property="og:description" content="A beautiful, newspaper-style Hacker News reader. Browse top stories, best posts, and community discussions in an elegant reading experience." />
    <meta property="og:url" content="https://hackernewstimes.com" />
    <meta property="og:site_name" content="Hacker News Times" />
    <meta property="og:image" content="https://hackernewstimes.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hacker News Times — Hacker News, Beautifully Delivered" />
    <meta name="twitter:description" content="A beautiful, newspaper-style Hacker News reader. Browse top stories, best posts, and community discussions." />
    <meta name="twitter:image" content="https://hackernewstimes.com/og-image.png" />

    <!-- Additional SEO -->
    <meta name="author" content="terryds" />
    <meta name="keywords" content="hacker news, hn reader, tech news, startup news, newspaper, hacker news reader, ycombinator, programming news" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HN Times" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Hacker News Times",
      "url": "https://hackernewstimes.com",
      "description": "A beautiful, newspaper-style Hacker News reader with weekly newsletter.",
      "applicationCategory": "NewsApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Person",
        "name": "terryds",
        "url": "https://github.com/terryds"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Serif+Display:ital@0;1&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
